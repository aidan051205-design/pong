<!DOCTYPE html><html lang="en"><head><meta charset=UTF-8><meta name="viewport" content="width=device-width,initial-scale=1"><title>Breakout Nova</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#05050f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden;user-select:none}h1{font-size:1.5rem;letter-spacing:6px;text-transform:uppercase;color:#ffdd00;text-shadow:0 0 14px #ffdd0088;margin-bottom:6px}#hud{display:flex;gap:50px;font-size:.85rem;margin-bottom:6px;color:#aaa;letter-spacing:2px}#hud span{color:#fff;font-size:1.1rem}canvas{border:2px solid #ffdd0033;border-radius:4px;cursor:none}#controls{margin-top:8px;font-size:.7rem;color:#444;letter-spacing:1px;text-align:center}#msg{position:absolute;font-size:1rem;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 10px #ffdd0088;pointer-events:none;text-align:center;padding:0 20px}</style></head><body><h1>Breakout Nova</h1><div id="hud">SCORE&nbsp;<span id="sc">0</span>&nbsp;&nbsp;LIVES&nbsp;<span id="lv">3</span>&nbsp;&nbsp;BEST&nbsp;<span id="bs">0</span>&nbsp;&nbsp;LEVEL&nbsp;<span id="lv2">1</span></div><div id="msg"></div><canvas id="c"></canvas><div id="controls">MOUSE to move paddle | CLICK or SPACE to launch | Catch power-ups!</div><script>const cv=document.getElementById('c'),cx=cv.getContext('2d'),mg=document.getElementById('msg'),scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),bsEl=document.getElementById('bs'),lv2El=document.getElementById('lv2');const W=cv.width=480,H=cv.height=520;let score=0,best=0,lives=3,level=1,running=false,launched=false,dead=false,mx=W/2;const pad={x:W/2,y:H-30,w:80,h:12};const balls=[];function mkBall(){return{x:pad.x,y:pad.y-12,vx:(Math.random()>.5?1:-1)*(2.5+level*.2),vy:-(3.5+level*.15),r:7,trail:[]};}let powerups=[],laserShots=[],laserActive=0,wideActive=0,slowActive=0;const PWUPS=[{type:'wide',color:'#00ffcc',label:'W'},{type:'multi',color:'#ff6ec7',label:'M'},{type:'slow',color:'#ffdd00',label:'S'},{type:'life',color:'#ff4444',label:'H'},{type:'laser',color:'#cc44ff',label:'L'}];let bricks=[];const BC=8,BR=6,BW=52,BH=18,BPX=6,BPY=5,BOX=12,BOY=50;const BCOLS=['#ff4444','#ff8844','#ffdd00','#44ff88','#00ffcc','#4488ff','#cc44ff','#ff6ec7'];function mkBricks(){bricks=[];for(let r=0;r<BR;r++)for(let c=0;c<BC;c++){const hp=r<2?2:1;bricks.push({x:BOX+c*(BW+BPX),y:BOY+r*(BH+BPY),w:BW,h:BH,hp,maxHp:hp,color:BCOLS[r],pwup:Math.random()<.12?PWUPS[Math.floor(Math.random()*PWUPS.length)]:null});}}let particles=[];function addP(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*5+1;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});}}function showMsg(t,p){mg.textContent=t;mg.style.opacity='1';if(!p){clearTimeout(mg._t);mg._t=setTimeout(()=>{mg.style.opacity='0';},1800);}}function startGame(){score=0;lives=3;level=1;running=true;launched=false;dead=false;balls.length=0;balls.push(mkBall());powerups=[];laserShots=[];laserActive=0;wideActive=0;slowActive=0;pad.w=80;mkBricks();scEl.textContent='0';lvEl.textContent='3';lv2El.textContent='1';mg.style.opacity='0';}function nextLevel(){level++;launched=false;balls.length=0;balls.push(mkBall());powerups=[];laserShots=[];laserActive=0;wideActive=0;slowActive=0;pad.w=80;mkBricks();lv2El.textContent=level;showMsg('LEVEL '+level,false);}document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(!running||dead)startGame();else if(!launched)launched=true;}});cv.addEventListener('click',()=>{if(!running||dead)startGame();else if(!launched)launched=true;});cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mx=Math.max(pad.w/2,Math.min(W-pad.w/2,e.clientX-r.left));});function loop(){cx.fillStyle='#05050f';cx.fillRect(0,0,W,H);if(!running){showMsg('CLICK or SPACE to start',true);requestAnimationFrame(loop);return;}pad.x+=(mx-pad.x)*.18;pad.w=wideActive>0?120:80;if(wideActive>0)wideActive--;if(laserActive>0)laserActive--;if(slowActive>0)slowActive--;for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=.03;if(p.life<=0){particles.splice(i,1);continue;}cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,2.5,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}for(let i=powerups.length-1;i>=0;i--){const pw=powerups[i];pw.y+=2;if(pw.y>H){powerups.splice(i,1);continue;}cx.fillStyle=pw.color;cx.shadowColor=pw.color;cx.shadowBlur=10;cx.beginPath();cx.roundRect(pw.x-14,pw.y-10,28,20,4);cx.fill();cx.shadowBlur=0;cx.fillStyle='#000';cx.font='bold 11px Courier New';cx.textAlign='center';cx.fillText(pw.label,pw.x,pw.y+4);if(Math.abs(pw.x-pad.x)<pad.w/2+14&&pw.y>pad.y-14&&pw.y<pad.y+10){if(pw.type==='wide')wideActive=300;else if(pw.type==='slow')slowActive=300;else if(pw.type==='multi'){for(let k=0;k<2;k++){const b=mkBall();b.vx=(k===0?1:-1)*Math.abs(3+level*.2);b.x=pad.x;b.y=pad.y-14;balls.push(b);}}else if(pw.type==='life'){lives=Math.min(5,lives+1);lvEl.textContent=lives;}else if(pw.type==='laser')laserActive=400;powerups.splice(i,1);}}if(laserActive>0&&Math.floor(Date.now()/200)%2===0){laserShots.push({x:pad.x-pad.w*.35,y:pad.y-12,vy:-10},{x:pad.x+pad.w*.35,y:pad.y-12,vy:-10});}for(let i=laserShots.length-1;i>=0;i--){const ls=laserShots[i];ls.y+=ls.vy;if(ls.y<-10){laserShots.splice(i,1);continue;}cx.strokeStyle='#cc44ff';cx.shadowColor='#cc44ff';cx.shadowBlur=8;cx.lineWidth=2;cx.beginPath();cx.moveTo(ls.x,ls.y);cx.lineTo(ls.x,ls.y+12);cx.stroke();cx.shadowBlur=0;for(let j=bricks.length-1;j>=0;j--){const b=bricks[j];if(ls.x>b.x&&ls.x<b.x+b.w&&ls.y>b.y&&ls.y<b.y+b.h){score+=10;scEl.textContent=score;if(score>best){best=score;bsEl.textContent=best;}addP(b.x+b.w/2,b.y+b.h/2,b.color,6);b.hp--;if(b.hp<=0){if(b.pwup)powerups.push({...b.pwup,x:b.x+b.w/2,y:b.y+b.h/2});bricks.splice(j,1);}laserShots.splice(i,1);break;}}}if(!launched){balls[0].x=pad.x;balls[0].y=pad.y-14;}for(let bi=balls.length-1;bi>=0;bi--){const ball=balls[bi];if(!launched)continue;const spd=slowActive>0?.6:1;ball.x+=ball.vx*spd;ball.y+=ball.vy*spd;ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>8)ball.trail.shift();ball.trail.forEach((t,i)=>{cx.globalAlpha=(i/ball.trail.length)*.4;cx.fillStyle='#ffdd00';cx.beginPath();cx.arc(t.x,t.y,ball.r*(i/ball.trail.length),0,Math.PI*2);cx.fill();});cx.globalAlpha=1;if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);}if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);}if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);}if(ball.y+ball.r>pad.y&&ball.y-ball.r<pad.y+pad.h&&ball.x>pad.x-pad.w/2&&ball.x<pad.x+pad.w/2&&ball.vy>0){const rel=(ball.x-pad.x)/(pad.w/2);ball.vx=(3+level*.2)*rel;ball.vy=-Math.abs(ball.vy);ball.y=pad.y-ball.r;}if(ball.y-ball.r>H){balls.splice(bi,1);if(balls.length===0){lives--;lvEl.textContent=lives;addP(pad.x,pad.y,'#ffdd00',20);if(lives<=0){dead=true;showMsg('GAME OVER - click or SPACE to retry',true);}else{launched=false;balls.push(mkBall());}}continue;}for(let j=bricks.length-1;j>=0;j--){const b=bricks[j];if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){const oL=ball.x+ball.r-b.x,oR=b.x+b.w-(ball.x-ball.r),oT=ball.y+ball.r-b.y,oB=b.y+b.h-(ball.y-ball.r);if(Math.min(oL,oR)<Math.min(oT,oB))ball.vx*=-1;else ball.vy*=-1;score+=b.hp===2?15:10;scEl.textContent=score;if(score>best){best=score;bsEl.textContent=best;}addP(b.x+b.w/2,b.y+b.h/2,b.color,8);b.hp--;if(b.hp<=0){if(b.pwup)powerups.push({...b.pwup,x:b.x+b.w/2,y:b.y+b.h/2});bricks.splice(j,1);}break;}}cx.shadowColor='#ffdd00';cx.shadowBlur=16;cx.fillStyle='#ffdd00';cx.beginPath();cx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;}for(const b of bricks){cx.globalAlpha=b.hp===b.maxHp?1:.55;cx.fillStyle=b.color+'66';cx.strokeStyle=b.color;cx.shadowColor=b.color;cx.shadowBlur=6;cx.lineWidth=2;cx.beginPath();cx.roundRect(b.x,b.y,b.w,b.h,3);cx.fill();cx.stroke();cx.shadowBlur=0;cx.globalAlpha=1;}const pg=cx.createLinearGradient(pad.x-pad.w/2,0,pad.x+pad.w/2,0);pg.addColorStop(0,'#ff8800');pg.addColorStop(.5,'#ffdd00');pg.addColorStop(1,'#ff8800');cx.fillStyle=pg;cx.shadowColor='#ffdd00';cx.shadowBlur=16;cx.beginPath();cx.roundRect(pad.x-pad.w/2,pad.y,pad.w,pad.h,6);cx.fill();cx.shadowBlur=0;cx.strokeStyle='#ffdd0066';cx.lineWidth=1;cx.beginPath();cx.moveTo(mx-8,pad.y+6);cx.lineTo(mx+8,pad.y+6);cx.moveTo(mx,pad.y-2);cx.lineTo(mx,pad.y+14);cx.stroke();if(bricks.length===0&&!dead)nextLevel();requestAnimationFrame(loop);}showMsg('CLICK or SPACE to start',true);loop();</script></body></html>
