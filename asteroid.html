<!DOCTYPE html><html lang="en"><head><meta charset=UTF-8><meta name="viewport" content="width=device-width,initial-scale=1"><title>Asteroid Blaster</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#05050f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden;user-select:none}h1{font-size:1.5rem;letter-spacing:6px;text-transform:uppercase;color:#00ffcc;text-shadow:0 0 14px #00ffcc88;margin-bottom:6px}#hud{display:flex;gap:50px;font-size:.85rem;margin-bottom:6px;color:#aaa;letter-spacing:2px}#hud span{color:#fff;font-size:1.1rem}canvas{border:2px solid #00ffcc33;border-radius:4px;cursor:crosshair}#controls{margin-top:8px;font-size:.7rem;color:#444;letter-spacing:1px;text-align:center}#msg{position:absolute;font-size:1.1rem;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 10px #ffdd0088;pointer-events:none;text-align:center}</style></head><body><h1>Asteroid Blaster</h1><div id="hud">SCORE&nbsp;<span id="sc">0</span>&nbsp;&nbsp;LIVES&nbsp;<span id="lv">3</span>&nbsp;&nbsp;BEST&nbsp;<span id="bs">0</span>&nbsp;&nbsp;WAVE&nbsp;<span id="wv">1</span></div><div id="msg"></div><canvas id="c"></canvas><div id="controls">AIM with mouse | CLICK or SPACE to shoot | WASD/ARROWS to thrust</div><script>const cv=document.getElementById('c'),cx=cv.getContext('2d');const mg=document.getElementById('msg'),scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),bsEl=document.getElementById('bs'),wvEl=document.getElementById('wv');const W=cv.width=520,H=cv.height=520;let score=0,best=0,lives=3,wave=1,running=false,launched=false,dead=false,waveClear=false,wavePause=0;const keys={};let mx=W/2,my=H/2;const stars=Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,a:Math.random()}));let particles=[],bullets=[],asteroids=[],bulletCooldown=0;const ship={x:W/2,y:H/2,vx:0,vy:0,radius:14,invincible:0,thrusting:false};function addP(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*4+1;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});}}function spawnA(n){for(let i=0;i<n;i++){let x,y;do{x=Math.random()*W;y=Math.random()*H;}while(Math.hypot(x-ship.x,y-ship.y)<120);const a=Math.random()*Math.PI*2,sp=Math.random()*1.2+.4+wave*.1,r=28+Math.random()*24;const sides=Math.floor(Math.random()*4)+7;const verts=[];for(let j=0;j<sides;j++){const ang=(j/sides)*Math.PI*2;verts.push({x:Math.cos(ang)*r*(0.75+Math.random()*.5),y:Math.sin(ang)*r*(0.75+Math.random()*.5)});}asteroids.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r,verts,rot:0,rotSpd:(Math.random()-.5)*.03,pts:Math.round(80/r*10)});}}function start(){score=0;lives=3;wave=1;running=true;dead=false;waveClear=false;wavePause=0;bullets=[];particles=[];ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;ship.invincible=120;asteroids=[];spawnA(4);scEl.textContent='0';lvEl.textContent='3';wvEl.textContent='1';mg.style.opacity='0';}function showMsg(t,p){mg.textContent=t;mg.style.opacity='1';if(!p){clearTimeout(mg._t);mg._t=setTimeout(()=>{mg.style.opacity='0';},1600);}}function wrap(o){if(o.x<-60)o.x=W+60;if(o.x>W+60)o.x=-60;if(o.y<-60)o.y=H+60;if(o.y>H+60)o.y=-60;}function shoot(){if(bulletCooldown>0)return;bulletCooldown=10;const dx=mx-ship.x,dy=my-ship.y,d=Math.hypot(dx,dy),bv=9;bullets.push({x:ship.x+dx/d*16,y:ship.y+dy/d*16,vx:dx/d*bv,vy:dy/d*bv,life:55});}document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();if(!running||dead)start();else shoot();}});document.addEventListener('keyup',e=>{keys[e.code]=false;});cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;});cv.addEventListener('click',()=>{if(!running||dead)start();else shoot();});function loop(){cx.fillStyle='#05050f';cx.fillRect(0,0,W,H);for(const s of stars){cx.fillStyle=`rgba(255,255,255,${s.a})`;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();}if(!running){showMsg('CLICK or SPACE to start',true);requestAnimationFrame(loop);return;}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life-=.03;if(p.life<=0){particles.splice(i,1);continue;}cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,2.5,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}if(!dead){if(wavePause>0){wavePause--;if(wavePause===0){wave++;asteroids=[];spawnA(4+wave);wvEl.textContent=wave;showMsg('WAVE '+wave,false);}}if(keys['KeyW']||keys['ArrowUp']){ship.vy-=.18;ship.thrusting=true;}else if(keys['KeyS']||keys['ArrowDown']){ship.vy+=.18;}else{ship.thrusting=false;}if(keys['KeyA']||keys['ArrowLeft'])ship.vx-=.18;if(keys['KeyD']||keys['ArrowRight'])ship.vx+=.18;ship.vx*=.985;ship.vy*=.985;ship.x+=ship.vx;ship.y+=ship.vy;wrap(ship);ship.angle=Math.atan2(my-ship.y,mx-ship.x);if(ship.invincible>0)ship.invincible--;if(bulletCooldown>0)bulletCooldown--;for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;wrap(b);if(b.life<=0){bullets.splice(i,1);continue;}cx.shadowColor='#00ffcc';cx.shadowBlur=8;cx.fillStyle='#00ffcc';cx.beginPath();cx.arc(b.x,b.y,3,0,Math.PI*2);cx.fill();cx.shadowBlur=0;for(let j=asteroids.length-1;j>=0;j--){const a=asteroids[j];if(Math.hypot(b.x-a.x,b.y-a.y)<a.r*.9){score+=a.pts;scEl.textContent=score;if(score>best){best=score;bsEl.textContent=best;}addP(a.x,a.y,'#ff8844',12);if(a.r>18){for(let k=0;k<2;k++){const na=Math.random()*Math.PI*2,nr=a.r*.55,ns=Math.floor(Math.random()*3)+6,nv=[];for(let m=0;m<ns;m++){const ang=(m/ns)*Math.PI*2;nv.push({x:Math.cos(ang)*nr*(0.75+Math.random()*.5),y:Math.sin(ang)*nr*(0.75+Math.random()*.5)});}asteroids.push({x:a.x,y:a.y,vx:Math.cos(na)*(Math.random()*1.5+.5+wave*.08),vy:Math.sin(na)*(Math.random()*1.5+.5+wave*.08),r:nr,verts:nv,rot:0,rotSpd:(Math.random()-.5)*.05,pts:Math.round(80/nr*10)});}}bullets.splice(i,1);asteroids.splice(j,1);break;}}}for(const a of asteroids){a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpd;wrap(a);cx.save();cx.translate(a.x,a.y);cx.rotate(a.rot);cx.beginPath();cx.moveTo(a.verts[0].x,a.verts[0].y);for(const v of a.verts)cx.lineTo(v.x,v.y);cx.closePath();cx.strokeStyle='#ff8844';cx.shadowColor='#ff8844';cx.shadowBlur=6;cx.lineWidth=2;cx.stroke();cx.shadowBlur=0;cx.restore();if(ship.invincible===0&&Math.hypot(ship.x-a.x,ship.y-a.y)<a.r*.8+ship.radius*.7){lives--;lvEl.textContent=lives;addP(ship.x,ship.y,'#00ffcc',20);ship.invincible=120;ship.vx=0;ship.vy=0;if(lives<=0){dead=true;showMsg('GAME OVER - click or SPACE to retry',true);}}}if(asteroids.length===0&&!waveClear&&wavePause===0){waveClear=true;wavePause=90;showMsg('WAVE CLEAR!',false);}if(!dead&&(ship.invincible===0||Math.floor(ship.invincible/8)%2===0)){cx.save();cx.translate(ship.x,ship.y);cx.rotate(ship.angle);if(ship.thrusting){cx.fillStyle='#ff6600';cx.shadowColor='#ff6600';cx.shadowBlur=14;cx.beginPath();cx.moveTo(-14,0);cx.lineTo(-22,-6);cx.lineTo(-22,6);cx.closePath();cx.fill();cx.shadowBlur=0;}cx.shadowColor='#00ffcc';cx.shadowBlur=12;cx.fillStyle='#00ffcc';cx.beginPath();cx.moveTo(18,0);cx.lineTo(-12,-10);cx.lineTo(-8,0);cx.lineTo(-12,10);cx.closePath();cx.fill();cx.shadowBlur=0;cx.fillStyle='#0a0a2a';cx.beginPath();cx.ellipse(4,0,4,3.5,0,0,Math.PI*2);cx.fill();cx.restore();}cx.strokeStyle='#00ffcc44';cx.lineWidth=1;cx.beginPath();cx.arc(mx,my,8,0,Math.PI*2);cx.moveTo(mx-14,my);cx.lineTo(mx-4,my);cx.moveTo(mx+4,my);cx.lineTo(mx+14,my);cx.moveTo(mx,my-14);cx.lineTo(mx,my-4);cx.moveTo(mx,my+4);cx.lineTo(mx,my+14);cx.stroke();}requestAnimationFrame(loop);}showMsg('CLICK or SPACE to start',true);loop();</script></body></html>
