<!DOCTYPE html><html lang="en"><head><meta charset=UTF-8><meta name="viewport" content="width=device-width,initial-scale=1"><title>Meteor Rush</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#05050f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden}h1{font-size:1.6rem;letter-spacing:6px;text-transform:uppercase;color:#ff6ec7;text-shadow:0 0 12px #ff6ec788;margin-bottom:8px}#hud{display:flex;gap:60px;font-size:1rem;margin-bottom:8px;color:#aaa;letter-spacing:2px}#hud span{color:#fff;font-size:1.3rem}canvas{border:2px solid #ff6ec744;border-radius:4px;box-shadow:0 0 30px #ff6ec722}#controls{margin-top:10px;font-size:.75rem;color:#555;letter-spacing:1px;text-align:center;line-height:1.8}#message{position:absolute;font-size:1.2rem;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 10px #ffdd0088;pointer-events:none;text-align:center}</style></head><body><h1>Meteor Rush</h1><div id="hud">SCORE&nbsp;<span id="sc">0</span>&nbsp;&nbsp;BEST&nbsp;<span id="bs">0</span></div><div id="message"></div><canvas id="c"></canvas><div id="controls">MOUSE or ARROW KEYS to move &nbsp;|&nbsp; Press <strong>SPACE</strong> to start / restart</div><script>const cv=document.getElementById('c'),cx=cv.getContext('2d'),mg=document.getElementById('message'),sc=document.getElementById('sc'),bs=document.getElementById('bs');const W=cv.width=480,H=cv.height=520;let score=0,best=0,frames=0,running=false,dead=false;const keys={};const stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,sp:Math.random()*.6+.2}));const ship={x:W/2,y:H-70,w:28,h:38};let tgt=W/2,meteors=[],mTimer=0,mInt=55;const COLS=['#ff6ec7','#ff4444','#ffaa44','#cc44ff','#ff8866'];function spawnM(){const s=Math.random()*22+10;meteors.push({x:Math.random()*(W-s*2)+s,y:-s,r:s,spd:Math.random()*2.5+1.5+score*.003,color:COLS[Math.floor(Math.random()*COLS.length)],rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.08,sides:Math.floor(Math.random()*3)+5});}function drawPoly(x,y,r,sides,rot,color){cx.beginPath();for(let i=0;i<sides;i++){const a=rot+(i/sides)*Math.PI*2,ir=r*.55,ox=x+Math.cos(a)*r,oy=y+Math.sin(a)*r,ix=x+Math.cos(a+Math.PI/sides)*ir,iy=y+Math.sin(a+Math.PI/sides)*ir;i===0?cx.moveTo(ox,oy):cx.lineTo(ox,oy);cx.lineTo(ix,iy);}cx.closePath();cx.fillStyle=color;cx.shadowColor=color;cx.shadowBlur=12;cx.fill();cx.shadowBlur=0;}function drawShip(x,y){cx.save();cx.translate(x,y);cx.shadowColor='#00ffcc';cx.shadowBlur=10;cx.fillStyle='#00ffcc';cx.beginPath();cx.moveTo(0,-19);cx.lineTo(-14,19);cx.lineTo(-8,8);cx.lineTo(0,14);cx.lineTo(8,8);cx.lineTo(14,19);cx.closePath();cx.fill();cx.shadowBlur=0;cx.fillStyle='#0a0a2a';cx.beginPath();cx.ellipse(0,-4,4,6,0,0,Math.PI*2);cx.fill();cx.restore();}function hit(ax,ay,ar,bx,by,bw,bh){const cx2=Math.max(bx-bw/2,Math.min(ax,bx+bw/2)),cy2=Math.max(by-bh/2,Math.min(ay,by+bh/2));return Math.hypot(ax-cx2,ay-cy2)<ar*.75;}function showMsg(t,p){mg.textContent=t;mg.style.opacity='1';if(!p){clearTimeout(mg._t);mg._t=setTimeout(()=>{mg.style.opacity='0';},1400);}}function start(){meteors=[];score=0;frames=0;mInt=55;mTimer=0;ship.x=W/2;tgt=W/2;sc.textContent='0';running=true;dead=false;mg.style.opacity='0';}document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();if(!running||dead)start();}if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();});document.addEventListener('keyup',e=>{keys[e.code]=false;});cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();tgt=Math.max(14,Math.min(W-14,e.clientX-r.left));});function loop(){cx.fillStyle='#05050f';cx.fillRect(0,0,W,H);for(const s of stars){s.y+=s.sp*(running&&!dead?1:.2);if(s.y>H){s.y=0;s.x=Math.random()*W;}cx.fillStyle='#ffffff44';cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();}if(!running){drawShip(ship.x,ship.y);showMsg('PRESS SPACE TO START',true);requestAnimationFrame(loop);return;}if(!dead){frames++;score=Math.floor(frames/6);sc.textContent=score;if(score>best){best=score;bs.textContent=best;}mInt=Math.max(18,55-Math.floor(frames/200)*3);mTimer++;if(mTimer>=mInt){spawnM();mTimer=0;}if(keys['ArrowLeft'])tgt=Math.max(14,ship.x-10);if(keys['ArrowRight'])tgt=Math.min(W-14,ship.x+10);ship.x+=(tgt-ship.x)*.15;for(let i=meteors.length-1;i>=0;i--){const m=meteors[i];m.y+=m.spd;m.rot+=m.rs;if(m.y>H+m.r*2){meteors.splice(i,1);continue;}drawPoly(m.x,m.y,m.r,m.sides,m.rot,m.color);if(hit(m.x,m.y,m.r,ship.x,ship.y,ship.w*.7,ship.h*.8)){dead=true;showMsg('SCORE '+score+' - SPACE to retry',true);}}}drawShip(ship.x,ship.y);requestAnimationFrame(loop);}showMsg('PRESS SPACE TO START',true);loop();</script></body></html>
