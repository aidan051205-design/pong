<!DOCTYPE html><html lang="en"><head><meta charset=UTF-8><meta name="viewport" content="width=device-width,initial-scale=1"><title>Typing Blitz</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#05050f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden;user-select:none}h1{font-size:1.5rem;letter-spacing:6px;text-transform:uppercase;color:#4488ff;text-shadow:0 0 14px #4488ff88;margin-bottom:6px}#hud{display:flex;gap:50px;font-size:.85rem;margin-bottom:6px;color:#aaa;letter-spacing:2px}#hud span{color:#fff;font-size:1.1rem}canvas{border:2px solid #4488ff33;border-radius:4px}#controls{margin-top:8px;font-size:.7rem;color:#444;letter-spacing:1px;text-align:center}#msg{position:absolute;font-size:1rem;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 10px #ffdd0088;pointer-events:none;text-align:center;padding:0 20px}#tb{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:transparent;border:none;outline:none;color:transparent;caret-color:transparent;font-size:1px;width:1px;height:1px;opacity:0}</style></head><body><h1>Typing Blitz</h1><div id="hud">SCORE&nbsp;<span id="sc">0</span>&nbsp;&nbsp;LIVES&nbsp;<span id="lv">3</span>&nbsp;&nbsp;BEST&nbsp;<span id="bs">0</span>&nbsp;&nbsp;WPM&nbsp;<span id="wpm">0</span></div><div id="msg"></div><canvas id="c"></canvas><input id="tb" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><div id="controls">Just TYPE the falling words to blast them | SPACE to start</div><script>const cv=document.getElementById('c'),cx=cv.getContext('2d'),tb=document.getElementById('tb'),mg=document.getElementById('msg'),scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),bsEl=document.getElementById('bs'),wpmEl=document.getElementById('wpm');const W=cv.width=520,H=cv.height=500;const WORDS=['alpha','bravo','pixel','laser','nexus','boost','cyber','storm','flash','blaze','swift','neon','orbit','turbo','vortex','spike','glide','forge','pulse','nova','dash','echo','force','ghost','hyper','impact','jump','karma','light','matrix','night','power','quest','rapid','solar','titan','ultra','vapor','wave','xenon','yield','zero','arcade','blast','comet','delta','ember','flare','gamma','helix','ionic','joule','kinetic','lunar','magnet','neutron','omega','photon','quark','rocket','sector','thrust','unity','vector','warp','axon','byte','core','disk','edge','fuel','grid','hash','icon','knot','loop','mode','node','open','ping','quad','ring','sync','tech','void','wire','exec','flip','glow','haze','iris','jazz','kilo','lime','mint','opal','plex','rift','sail','urge','veil','wind','xray','zeal'];let score=0,best=0,lives=3,running=false,dead=false,words=[],typed='',wordsTyped=0,startTime=0,particles=[],hits=[],spawnTimer=0,spawnInterval=120,level=1,speed=0.8,curInput='';const WCOLS=['#4488ff','#00ffcc','#ff6ec7','#ffdd00','#cc44ff','#ff8844'];function rndWord(){return WORDS[Math.floor(Math.random()*WORDS.length)];}function spawnWord(){const w=rndWord();cx.font='bold 18px Courier New';const tw=cx.measureText(w).width;const x=Math.random()*(W-tw-20)+10;words.push({text:w,typed:0,x,y:-18,vy:speed*(1+level*.08),color:WCOLS[Math.floor(Math.random()*WCOLS.length)],tw});}function addP(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*6+2;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:Math.random()*4+1});}}function addHit(x,y,text){hits.push({x,y,text,life:1.2,vy:-1.2});}function showMsg(t,p){mg.textContent=t;mg.style.opacity='1';if(!p){clearTimeout(mg._t);mg._t=setTimeout(()=>{mg.style.opacity='0';},1600);}}function startGame(){score=0;lives=3;level=1;speed=0.8;running=true;dead=false;words=[];typed='';particles=[];hits=[];spawnTimer=0;spawnInterval=120;wordsTyped=0;startTime=Date.now();scEl.textContent='0';lvEl.textContent='3';wpmEl.textContent='0';mg.style.opacity='0';tb.value='';curInput='';tb.focus();}function checkTyped(){const t=tb.value.toLowerCase().trim();if(!t)return;let best2=-1,bestLen=0;for(let i=0;i<words.length;i++){if(words[i].text.toLowerCase().startsWith(t)&&t.length>bestLen){bestLen=t.length;best2=i;}}for(let i=0;i<words.length;i++)words[i].typed=0;if(best2>=0){const w=words[best2];w.typed=t.length;if(w.typed>=w.text.length){const pts=Math.round(w.text.length*15*(1+level*.1));score+=pts;wordsTyped++;if(score>best){best=score;bsEl.textContent=best;}scEl.textContent=score;addP(w.x+w.tw/2,w.y,w.color,16);addHit(w.x+w.tw/2,w.y-10,'+'+pts);words.splice(best2,1);tb.value='';curInput='';if(wordsTyped%10===0){level++;speed=Math.min(3.5,speed+.25);spawnInterval=Math.max(45,spawnInterval-10);showMsg('LEVEL '+level+'!',false);}const mins=(Date.now()-startTime)/60000;wpmEl.textContent=Math.round(wordsTyped/Math.max(.01,mins));}}}tb.addEventListener('input',()=>{curInput=tb.value;checkTyped();});document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){if(!running||dead){startGame();return;}e.preventDefault();}if(running&&!dead)tb.focus();});cv.addEventListener('click',()=>{if(!running||dead)startGame();else tb.focus();});function loop(){cx.fillStyle='#05050f';cx.fillRect(0,0,W,H);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.94;p.life-=.04;if(p.life<=0){particles.splice(i,1);continue;}cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}for(let i=hits.length-1;i>=0;i--){const h=hits[i];h.y+=h.vy;h.life-=.04;if(h.life<=0){hits.splice(i,1);continue;}cx.globalAlpha=h.life;cx.fillStyle='#ffdd00';cx.font='bold 16px Courier New';cx.textAlign='center';cx.fillText(h.text,h.x,h.y);cx.globalAlpha=1;}if(!running){cx.fillStyle='#4488ff55';cx.font='bold 20px Courier New';cx.textAlign='center';cx.fillText('TYPE TO DESTROY FALLING WORDS',W/2,H/2-10);cx.font='14px Courier New';cx.fillStyle='#555';cx.fillText('Press SPACE or click to start',W/2,H/2+30);requestAnimationFrame(loop);return;}if(!dead){spawnTimer++;if(spawnTimer>=spawnInterval){spawnWord();spawnTimer=0;if(Math.random()<.3)spawnWord();}for(let i=words.length-1;i>=0;i--){const w=words[i];w.y+=w.vy;if(w.y>H+20){words.splice(i,1);lives--;lvEl.textContent=lives;addP(w.x+w.tw/2,H-10,'#ff4444',12);if(lives<=0){dead=true;showMsg('GAME OVER - click or SPACE to retry',true);}continue;}cx.font='bold 18px Courier New';cx.textAlign='left';if(w.typed>0){cx.shadowColor='#fff';cx.shadowBlur=12;cx.fillStyle='#fff';cx.fillText(w.text.slice(0,w.typed),w.x,w.y);cx.shadowBlur=0;cx.shadowColor=w.color;cx.shadowBlur=4;cx.fillStyle=w.color+'55';const tw2=cx.measureText(w.text.slice(0,w.typed)).width;cx.fillText(w.text.slice(w.typed),w.x+tw2,w.y);}else{cx.shadowColor=w.color;cx.shadowBlur=8;cx.fillStyle=w.color+'cc';cx.fillText(w.text,w.x,w.y);}cx.shadowBlur=0;if(w.y>H*.7){cx.globalAlpha=Math.sin(Date.now()*.01)*.4+.6;cx.fillStyle='#ff4444';cx.font='12px Courier New';cx.fillText('!',w.x+w.tw+4,w.y);cx.globalAlpha=1;}}}cx.fillStyle='#0c0c1e';cx.fillRect(0,H-50,W,50);cx.strokeStyle='#4488ff44';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,H-50);cx.lineTo(W,H-50);cx.stroke();cx.font='bold 20px Courier New';cx.textAlign='center';const disp=curInput||'start typing...';cx.fillStyle=curInput?'#4488ff':'#333';cx.shadowColor=curInput?'#4488ff':'transparent';cx.shadowBlur=curInput?10:0;cx.fillText(disp,W/2,H-18);cx.shadowBlur=0;requestAnimationFrame(loop);}showMsg('CLICK or SPACE to start',true);loop();</script></body></html>
