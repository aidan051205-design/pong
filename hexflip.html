<!DOCTYPE html><html lang="en"><head><meta charset=UTF-8><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hex Flip</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#05050f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden;user-select:none}h1{font-size:1.5rem;letter-spacing:6px;text-transform:uppercase;color:#cc44ff;text-shadow:0 0 14px #cc44ff88;margin-bottom:6px}#hud{display:flex;gap:50px;font-size:.85rem;margin-bottom:6px;color:#aaa;letter-spacing:2px}#hud span{color:#fff;font-size:1.1rem}canvas{cursor:pointer}#controls{margin-top:8px;font-size:.7rem;color:#444;letter-spacing:1px;text-align:center;line-height:1.8}#msg{position:absolute;font-size:1.1rem;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 10px #ffdd0088;pointer-events:none;text-align:center;padding:0 20px}</style></head><body><h1>Hex Flip</h1><div id="hud">SCORE&nbsp;<span id="sc">0</span>&nbsp;&nbsp;MOVES&nbsp;<span id="mv">20</span>&nbsp;&nbsp;BEST&nbsp;<span id="bs">0</span></div><div id="msg"></div><canvas id="c"></canvas><div id="controls">CLICK a hex to cycle its color and neighbors | Chain same-color groups for big points | Clear all to advance</div><script>const cv=document.getElementById('c'),cx=cv.getContext('2d'),mg=document.getElementById('msg'),scEl=document.getElementById('sc'),mvEl=document.getElementById('mv'),bsEl=document.getElementById('bs');const W=cv.width=480,H=cv.height=480;const COLS=6,ROWS=6,HS=36;const COLORS=['#cc44ff','#ff6ec7','#00ffcc','#ffdd00','#ff8844'];let grid=[],score=0,best=0,moves=20,level=1,running=false;let particles=[];function addP(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*5+2;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:Math.random()*4+2});}}function hexCenter(col,row){const x=HS*1.75*col+HS+50+(row%2===1?HS*.875:0);const y=HS*1.52*row+HS+30;return{x,y};}function hexPath(hx,hy,r){const p=new Path2D();for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);const px=hx+r*Math.cos(a),py=hy+r*Math.sin(a);i===0?p.moveTo(px,py):p.lineTo(px,py);}p.closePath();return p;}function neighbors(col,row){const odd=row%2===1;return[[col,row-1],[col+(odd?1:0),row-1],[col+1,row],[col,row+1],[col+(odd?1:0),row+1],[col-1,row]].filter(([c,r])=>c>=0&&c<COLS&&r>=0&&r<ROWS);}function makeGrid(){grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++){grid[r][c]={color:Math.floor(Math.random()*COLORS.length),flash:0,scale:1};}}}function showMsg(t,p){mg.textContent=t;mg.style.opacity='1';if(!p){clearTimeout(mg._t);mg._t=setTimeout(()=>{mg.style.opacity='0';},1800);}}function startGame(){score=0;moves=20+level*2;level=1;running=true;particles=[];makeGrid();scEl.textContent='0';mvEl.textContent=moves;mg.style.opacity='0';}function clickHex(col,row){if(!running||moves<=0)return;const toFlip=[[col,row],...neighbors(col,row)];let chains=0;const visited=new Set();function checkChain(c,r){const key=c+','+r;if(visited.has(key))return;visited.add(key);const ns=neighbors(c,r);const matchNs=ns.filter(([nc,nr])=>grid[nr][nc].color===grid[r][c].color);if(matchNs.length>=2){chains++;matchNs.forEach(([nc,nr])=>checkChain(nc,nr));}}toFlip.forEach(([c,r])=>{grid[r][c].color=(grid[r][c].color+1)%COLORS.length;grid[r][c].flash=12;grid[r][c].scale=1.25;const{x,y}=hexCenter(c,r);addP(x,y,COLORS[grid[r][c].color],6);});toFlip.forEach(([c,r])=>checkChain(c,r));const pts=(toFlip.length+chains*3)*10*(1+Math.floor(level/2)*.5);score+=Math.round(pts);if(score>best){best=score;bsEl.textContent=best;}scEl.textContent=score;moves--;mvEl.textContent=moves;let allMatch=true;const fc=grid[0][0].color;for(let r=0;r<ROWS&&allMatch;r++)for(let c=0;c<COLS&&allMatch;c++)if(grid[r][c].color!==fc)allMatch=false;if(allMatch){score+=500*level;scEl.textContent=score;if(score>best){best=score;bsEl.textContent=best;}showMsg('BOARD CLEAR! +500 bonus',false);setTimeout(()=>{level++;moves=20+level*2;mvEl.textContent=moves;makeGrid();},1800);}else if(moves<=0){showMsg('OUT OF MOVES - click to retry',true);running=false;}}cv.addEventListener('click',e=>{if(!running){startGame();return;}const rect=cv.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const{x,y}=hexCenter(c,r);if(Math.hypot(mx-x,my-y)<HS*.9){clickHex(c,r);return;}}});function loop(){cx.fillStyle='#05050f';cx.fillRect(0,0,W,H);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.life-=.04;if(p.life<=0){particles.splice(i,1);continue;}cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const h=grid[r]&&grid[r][c];if(!h)continue;const{x,y}=hexCenter(c,r);if(h.flash>0)h.flash--;if(h.scale>1)h.scale=Math.max(1,h.scale-.04);cx.save();cx.translate(x,y);cx.scale(h.scale,h.scale);cx.translate(-x,-y);const p=hexPath(x,y,HS-.5);cx.shadowColor=COLORS[h.color];cx.shadowBlur=h.flash>0?20:6;cx.fillStyle=COLORS[h.color]+(h.flash>0?'dd':'88');cx.fill(p);cx.strokeStyle=COLORS[h.color];cx.lineWidth=2;cx.stroke(p);cx.shadowBlur=0;cx.restore();}if(!running&&grid.length===0){showMsg('CLICK to start',true);}requestAnimationFrame(loop);}showMsg('CLICK to start',true);loop();</script></body></html>
